name: Build & Deploy

# ─────────────────────────────────────────────
# トリガー
# ─────────────────────────────────────────────
on:
  # 1. このリポジトリ（451-docs）に直接pushされたとき
  push:
    branches: [main]

  # 2. md-contents（private）からの通知を受け取ったとき
  #    content側のworkflowから repository_dispatch を飛ばす
  repository_dispatch:
    types: [content-updated]

  # 3. 手動実行
  workflow_dispatch:

# ─────────────────────────────────────────────
# ジョブ
# ─────────────────────────────────────────────
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: 451-docs をチェックアウト ──
      - name: Checkout 451-docs
        uses: actions/checkout@v4

      # ── Step 2: md-contents（private）からMDを取得 ──
      # PAT は 451-docs の Settings > Secrets > CONTENT_REPO_PAT に設定する
      - name: Fetch content from private repo
        env:
          CONTENT_PAT: ${{ secrets.CONTENT_REPO_PAT }}
        run: |
          git clone \
            https://x-access-token:${CONTENT_PAT}@github.com/Shoei451/md-contents.git \
            _content_tmp
          # MDファイルを 451-docs/public_posts にコピー
          mkdir -p 451-docs/public_posts
          cp -r _content_tmp/posts/. 451-docs/public_posts/
          rm -rf _content_tmp
          echo "MD files copied:"
          ls 451-docs/public_posts/

      # ── Step 3: Node.js セットアップ ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 4: ビルド ──
      - name: Run build
        run: node build.js

      # ── Step 5: 生成ファイルをコミット ──
      # posts-data/*.json, posts.json, js/home-data.js を自動コミット
      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts-data/ posts.json js/home-data.js
          # 差分がないときはスキップ
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: rebuild posts-data [skip ci]"
          git push