<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading… — My Notes</title>
  <link rel="icon" href="images/451-docs-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/theme.css">
  <!-- marked.js is needed for every post; load statically -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="page-loader"></div>

<a href="index.html" class="back-link" aria-label="ホームへ戻る">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"></polyline>
  </svg>
  <span>Home</span>
</a>

<span class="logo-switches">
  <button id="theme-toggle" aria-label="Toggle Theme">
    <svg id="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
</span>

<div class="overlay" id="overlay"></div>

<button class="toc-toggle" id="tocToggle" style="display:none;">
  <span class="icon">☰</span>
  <span class="label">目次</span>
</button>

<aside class="toc" id="toc">
  <h3>目次</h3>
  <nav id="tocList"></nav>
</aside>

<article class="article" id="article">

  <div id="post-loading" style="text-align:center; padding:80px 0; color:var(--sub);">
    読み込み中…
  </div>

  <div id="post-error" style="display:none; text-align:center; padding:80px 0;">
    <p style="color:var(--sub); font-size:1.1rem;">記事が見つかりませんでした。</p>
    <p style="margin-top:12px;">
      <a href="index.html" style="color:var(--accent);">← ホームに戻る</a>
    </p>
  </div>

  <div id="post-content" style="display:none;">
    <img id="post-thumbnail" class="thumbnail" alt="" style="display:none;">
    <h1 id="post-title"></h1>
    <p id="post-date" class="post-meta"></p>

    <nav class="toc-box" id="tocBox" style="display:none;">
      <h3>目次</h3>
      <ul></ul>
    </nav>

    <div id="post-body"></div>
  </div>

  <footer class="site-footer-bottom" id="post-footer" style="display:none;">
    <p>© 2026 Shoei451</p>
  </footer>

</article>

<script src="js/theme-toggle.js"></script>
<script src="js/post-common.js"></script>

<script>
// =============================================
// Main — fetch post from /api/post and render
// =============================================
async function loadPost() {
  loaderStart();

  const params = new URLSearchParams(window.location.search);
  const slug   = params.get('slug');

  const showError = () => {
    document.getElementById('post-loading').style.display = 'none';
    document.getElementById('post-error').style.display   = '';
    loaderDone();
  };

  if (!slug) { showError(); return; }

  // 1. Fetch post JSON
  let post;
  try {
    const res = await fetch(`/api/post?slug=${encodeURIComponent(slug)}`);
    if (!res.ok) throw new Error('not found');
    post = await res.json();
  } catch {
    showError();
    return;
  }

  // 2. Load optional libraries before rendering
  await loadComponents(post.components);

  // 3. Metadata
  document.title = (post.title || slug) + ' — My Notes';

  if (post.thumbnail) {
    const img         = document.getElementById('post-thumbnail');
    img.src           = post.thumbnail;
    img.style.display = '';
  }

  document.getElementById('post-title').textContent = post.title || slug;

  if (post.date) {
    const [y, m, d] = post.date.split('-');
    document.getElementById('post-date').textContent =
      `${y}年${parseInt(m)}月${parseInt(d)}日`;
  }

  // 4. Markdown → HTML
  marked.use({ mangle: false, headerIds: false });
  const postBody = document.getElementById('post-body');
  postBody.innerHTML = marked.parse(post.content || '');
  makeTablesScrollable(postBody);

  // 5. KaTeX
  if (post.components?.katex && typeof renderMathInElement !== 'undefined') {
    renderMathInElement(postBody, {
      delimiters: [
        { left: '$$', right: '$$', display: true  },
        { left: '$',  right: '$',  display: false },
      ],
      throwOnError: false,
    });
  }

  // 6. Highlight.js + dark mode watch
  if (post.components?.highlight && typeof hljs !== 'undefined') {
    document.querySelectorAll('#post-body pre code').forEach(el => hljs.highlightElement(el));
    new MutationObserver(() => {
      const dark  = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
      const light = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
      ComponentLoader.loadCSS(document.body.classList.contains('dark') ? dark : light);
    }).observe(document.body, { attributeFilter: ['class'] });
  }

  // 7. Show content
  document.getElementById('post-loading').style.display = 'none';
  document.getElementById('post-content').style.display = '';
  document.getElementById('post-footer').style.display  = '';

  loaderDone();

  // 8. TOC (after content is in the DOM)
  buildToc();
}

document.addEventListener('DOMContentLoaded', loadPost);
</script>
</body>
</html>
