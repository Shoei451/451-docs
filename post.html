<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  -->
  <!-- marked.js は全記事で必要なので静的読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<span class="logo-switches">

    <svg id="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>

    </svg>

</button>

<aside class="toc" id="toc">

<article class="article" id="article">

  </div>

    </nav>

  </footer>

<script src="js/theme-toggle.js"></script>

<script>
// =============================================
// ComponentLoader
// CSS / JS を動的に <head> へ挿入する。
// 同じ URL は一度しか挿入しない（Setで管理）。
// =============================================
const ComponentLoader = (() => {
  const loaded = new Set();

  function loadCSS(href) {
    if (loaded.has(href)) return Promise.resolve();
    return new Promise(resolve => {
      const el  = document.createElement('link');
      el.rel    = 'stylesheet';
      el.href   = href;
      el.onload = el.onerror = () => { loaded.add(href); resolve(); };
      document.head.appendChild(el);
    });
  }

  function loadJS(src) {
    if (loaded.has(src)) return Promise.resolve();
    return new Promise(resolve => {
      const el   = document.createElement('script');
      el.src     = src;
      el.onload  = el.onerror = () => { loaded.add(src); resolve(); };
      document.head.appendChild(el);
    });
  }

  return { loadCSS, loadJS };
})();

// =============================================
// loadComponents
// post.components の true/false に従ってライブラリを読む。
// =============================================
async function loadComponents(components) {
  const c    = components || {};
  const jobs = [];

  if (c.katex) {
    // KaTeX: CSS → katex.min.js → auto-render.min.js の順序が必要
    jobs.push(
      ComponentLoader.loadCSS(
        'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css'
      ).then(() =>
        ComponentLoader.loadJS(
          'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js'
        )
      ).then(() =>
        ComponentLoader.loadJS(
          'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js'
        )
      )
    );
  }

  if (c.highlight) {
    const isDark  = document.body.classList.contains('dark');
    const themeCDN = isDark
      ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
      : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';

    jobs.push(
      ComponentLoader.loadCSS(themeCDN).then(() =>
        ComponentLoader.loadJS(
          'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js'
        )
      )
    );
  }

  await Promise.all(jobs);
}

// =============================================
// TOC builder
// =============================================
function buildToc() {
  const article  = document.getElementById('article');
  const headings = article.querySelectorAll('h2, h3, h4');
  if (!headings.length) return;

  const tocToggle = document.getElementById('tocToggle');
  const tocBoxEl  = document.getElementById('tocBox');
  const tocList   = document.getElementById('tocList');
  const tocBox    = tocBoxEl.querySelector('ul');

  tocToggle.style.display = '';
  tocBoxEl.style.display  = '';

  headings.forEach((h, i) => {
    const id = 'section-' + i;
    h.id = id;

    const makeLink = () => {
      const a       = document.createElement('a');
      a.href        = '#' + id;
      a.textContent = h.textContent;
      if (h.tagName === 'H3') a.classList.add('h3');
      if (h.tagName === 'H4') a.classList.add('h4');
      return a;
    };

    tocList.appendChild(makeLink());

    const li = document.createElement('li');
    if (h.tagName === 'H3') li.classList.add('h3');
    if (h.tagName === 'H4') li.classList.add('h4');
    li.appendChild(makeLink());
    tocBox.appendChild(li);
  });

  const overlay = document.getElementById('overlay');
  const close   = () => document.body.classList.remove('toc-open');
  tocToggle.addEventListener('click', () => document.body.classList.toggle('toc-open'));
  overlay.addEventListener('click', close);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

  document.addEventListener('click', e => {
    if (e.target.matches('.toc a, .toc-box a')) {
      e.preventDefault();
      const target = document.querySelector(e.target.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      close();
    }
  });

  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      document.querySelectorAll('.toc a').forEach(a => a.classList.remove('active'));
      const active = document.querySelector(`.toc a[href="#${entry.target.id}"]`);
      if (active) active.classList.add('active');
    });
  }, { rootMargin: '-40% 0px -50% 0px' });

  headings.forEach(h => obs.observe(h));
}

// =============================================
// Main
// =============================================
async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  const slug   = params.get('slug');

  const showError = () => {
    document.getElementById('post-loading').style.display = 'none';
    document.getElementById('post-error').style.display   = '';
  };

  if (!slug) { showError(); return; }

  // 1. JSON フェッチ
  let post;
  try {
    const res = await fetch(`posts-data/${slug}.json`);
    if (!res.ok) throw new Error('not found');
    post = await res.json();
  } catch {
    showError();
    return;
  }

  // 2. 必要なコンポーネントを先に読み込む（レンダリング前に揃える）
  await loadComponents(post.components);

  // 3. メタデータを DOM に反映
  document.title = (post.title || slug) + ' — My Notes';

  if (post.thumbnail) {
    const img         = document.getElementById('post-thumbnail');
    img.src           = post.thumbnail;
    img.style.display = '';
  }

  document.getElementById('post-title').textContent = post.title || slug;

  if (post.date) {
    const [y, m, d] = post.date.split('-');
    document.getElementById('post-date').textContent =
      `${y}年${parseInt(m)}月${parseInt(d)}日`;
  }

  // 4. Markdown → HTML
  marked.use({ mangle: false, headerIds: false });
  document.getElementById('post-body').innerHTML = marked.parse(post.content || '');

  // 5. KaTeX
  if (post.components?.katex && typeof renderMathInElement !== 'undefined') {
    renderMathInElement(document.getElementById('post-body'), {
      delimiters: [
        { left: '$$', right: '$$', display: true  },
        { left: '$',  right: '$',  display: false },
      ],
      throwOnError: false,
    });
  }

  // 6. Highlight.js + ダークモード追従
  if (post.components?.highlight && typeof hljs !== 'undefined') {
    document.querySelectorAll('#post-body pre code').forEach(el => {
      hljs.highlightElement(el);
    });

    // テーマ切り替え時に hljs の CSS も差し替える
    new MutationObserver(() => {
      const dark  = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
      const light = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
      ComponentLoader.loadCSS(
        document.body.classList.contains('dark') ? dark : light
      );
    }).observe(document.body, { attributeFilter: ['class'] });
  }

  // 7. 表示
  document.getElementById('post-loading').style.display = 'none';
  document.getElementById('post-content').style.display = '';
  document.getElementById('post-footer').style.display  = '';

  // 8. TOC（コンテンツが DOM に入ってから）
  buildToc();
}

document.addEventListener('DOMContentLoaded', loadPost);
</script>
</body>
</html>
