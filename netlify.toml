[build]
  command = "echo 'No build step — static site with Netlify Functions'"
  publish = "."
  functions = "netlify/functions"

# /api/posts  → netlify/functions/posts.js
# /api/post   → netlify/functions/post.js
[[redirects]]
  from   = "/api/posts"
  to     = "/.netlify/functions/posts"
  status = 200

[[redirects]]
  from   = "/api/post"
  to     = "/.netlify/functions/post"
  status = 200